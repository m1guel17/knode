# Phase 3 default configuration. Environment variables take precedence
# (see src/shared/config.ts for the merge order).

[chunker]
# Target tokens per chunk. ~500 fits comfortably in any model context window.
targetTokens = 500
# Overlap shared between adjacent chunks; partially mitigates boundary entity loss.
overlapTokens = 50
# Below this, the chunker merges a section's tail into the next section's first chunk.
# 0 disables merge-forward entirely (each section gets its own chunk regardless of size).
minChunkTokens = 0
# Hard ceiling. Tables exceeding this are still emitted but logged as warnings.
maxChunkTokens = 2000
# Splitter priority order — chunker tries heading boundaries first, then paragraph, then sentence.
splitOn = ["heading", "paragraph", "sentence"]
# PDFs that yield fewer characters than this per page total are flagged as
# image-only (OCR fallback is Phase 4). pdf-parse returns nothing useful below
# this threshold so we fail fast with a clear error.
ocrThresholdCharsPerPage = 50

[extraction]
provider = "anthropic"
# Cheap model for triple extraction. The resolver uses a more capable model below.
model = "claude-haiku-4-5-20251001"
temperature = 0.0
maxRetries = 2
ontologyPath = "config/ontology/default-ontology.json"
# Per-document chunk extraction concurrency. ~5 chunks of one document run in
# parallel, results collected, then a single graph write transaction.
batchSize = 5

[extraction.resolution]
enabled = true
# Tiered model: extraction uses Haiku, resolution uses Sonnet.
model = "claude-sonnet-4-6"
similarityThreshold = 0.92
highConfidenceThreshold = 0.99
maxCandidatesPerEntity = 5
# Resolution adds noise for these types — skip them.
skipTypes = ["Date", "Metric"]

[embedding]
# Three providers supported: "openai" (1536 dims), "google", "ollama".
# IMPORTANT: changing dimensions requires deleting the existing graph — Neo4j
# vector indexes pin the dimension at creation time.
#
# Google: gemini-embedding-001 (current free-tier model). Native dims are 3072
# but the API supports outputDimensionality truncation; we ask for 768 to
# stay compact. The provider bypasses @ai-sdk/google (which only knows the
# unsupported :batchEmbedContents endpoint) and calls :embedContent directly.
provider = "google"
model = "gemini-embedding-001"
dimensions = 768
batchSize = 100
enabled = true

[storage.neo4j]
uri = "bolt://localhost:7687"
user = "neo4j"
password = "knode-dev-password"
database = "neo4j"

[processingLog]
path = "./data/processing-log.db"

[scanner]
# Glob-style ignore patterns for folder mode.
ignorePatterns = [
  "**/.git/**",
  "**/node_modules/**",
  "**/.DS_Store",
  "**/Thumbs.db",
  "**/~$*",
]

[scanner.queue]
redisUrl = "redis://localhost:6379"
# File processing is LLM-bound; keep concurrency low to respect rate limits.
fileConcurrency = 2
# Resolution is graph-DB-bound and can run higher concurrency.
resolutionConcurrency = 4
rateLimitMax = 10
rateLimitDurationMs = 60000
retryAttempts = 3
retryBackoffBaseMs = 5000

[cost]
pricingPath = "config/pricing.toml"
# Hard ceiling for the entire run. Set per-environment.
# budgetPerRunUsd = 10.0
# Per-document soft ceiling.
# budgetPerDocumentUsd = 1.0
warnAtFraction = 0.8

[api]
host = "127.0.0.1"
port = 3030
# Hard ceiling on Cypher execution. Long queries get cancelled.
cypherTimeoutMs = 30000
# Result row cap. Larger results return 413 with a hint to add LIMIT.
cypherMaxRows = 10000
# Off by default — when on, the literal query text is logged at debug level
# (helpful for triage but a privacy footgun in production).
logQueryText = false

[rag]
enabled = true
# Sonnet for synthesis — Phase 3 RAG quality is determined here.
answerModel = "claude-sonnet-4-6"
answerTemperature = 0.0
# Step 1 retrieval breadth. Cast a wide net; expansion narrows it.
paragraphTopK = 10
entityTopK = 10
# Step 2 expansion.
maxHops = 2
layoutWindow = 1
# Step 3 token budget for the assembled context.
maxContextTokens = 4000
maxAnswerTokens = 1024
# Ranking weight: rankAlpha * vector + (1-rankAlpha) * (anchorMatches/anchorCount)
rankAlpha = 0.7

[hybridSearch]
enabled = true
paragraphTopK = 15
entityTopK = 15
maxHops = 2
layoutWindow = 1

# Plugins are listed by name; the actual class is wired in src/plugins/index.ts
# (the static registry). errorMode controls whether a plugin failure halts the
# pipeline (`halt`) or only logs and continues (`continue`, default).
[plugins]
enabled = []
# Example:
# enabled = [
#   { name = "confidence-filter", errorMode = "continue", options = { minEntityConfidence = 0.5, minRelationshipConfidence = 0.6 } },
#   { name = "cost-reporter", errorMode = "continue", options = {} },
# ]
